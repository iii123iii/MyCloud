worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Large file support ─────────────────────────────────────────────
    client_max_body_size      10G;
    client_body_buffer_size   128k;
    proxy_read_timeout        600s;
    proxy_send_timeout        600s;
    proxy_connect_timeout     60s;

    # Don't buffer proxied responses — stream them directly to the client.
    # Critical for multi-GB downloads to avoid nginx temp files.
    proxy_buffering           off;
    proxy_request_buffering   off;
    proxy_max_temp_file_size  0;

    # ── Gzip for API JSON responses ────────────────────────────────────
    gzip              on;
    gzip_types        application/json text/plain text/css application/javascript;
    gzip_min_length   256;
    gzip_comp_level   4;

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;
        http2 on;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ── Backend API ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stream responses directly — no temp files for large downloads
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_http_version      1.1;
            proxy_set_header Connection "";
        }

        # ── Frontend (Next.js) ─────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static asset caching for Next.js ───────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend:3000;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
