<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCloud Sync</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">

      <!-- Header -->
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <span class="brand-name">MyCloud</span>
        </div>
        <div class="topbar-right">
          <span class="status-chip" id="status-chip">
            <span class="status-dot idle" id="status-dot"></span>
            <span id="status-label">Idle</span>
          </span>
        </div>
      </header>

      <!-- VIEW: Main (logged in) -->
      <div id="main-view" class="view is-hidden">
        <div class="sync-info-row">
          <span id="sync-detail-msg" class="sync-detail-msg">Idle</span>
          <span id="last-sync-label" class="last-sync-label"></span>
        </div>
        <section id="progress-section" class="progress-section is-hidden">
          <div class="progress-header">
            <span id="progress-label">Syncing...</span>
            <span id="progress-count">0 / 0</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <p id="progress-file" class="progress-file"></p>
        </section>
        <section class="card-section folder-section">
          <div class="section-header">
            <span class="section-title">Watched Folders</span>
            <button id="pick-folder-btn" class="icon-btn" type="button" title="Add folder">+</button>
          </div>
          <div id="folders-list" class="folder-list"></div>
        </section>
        <section class="card-section activity-section">
          <div class="section-header">
            <span class="section-title">Recent Activity</span>
            <span id="activity-count" class="activity-count"></span>
          </div>
          <div id="activity-list" class="activity-list"></div>
        </section>
      </div>

      <!-- VIEW: Login -->
      <div id="login-view" class="view is-hidden">
        <div class="login-card">
          <p class="login-eyebrow">Connect to your server</p>
          <form id="login-form" class="login-form" autocomplete="on">
            <label class="field-label">
              <span>Server URL</span>
              <input id="apiBaseUrl" name="apiBaseUrl" type="url" placeholder="https://cloud.example.com" required />
            </label>
            <label class="field-label">
              <span>Email or Username</span>
              <input id="email" name="email" type="text" placeholder="you@example.com" required autocomplete="username" />
            </label>
            <label class="field-label">
              <span>Password</span>
              <input id="password" name="password" type="password" required autocomplete="current-password" />
            </label>
            <label class="checkbox-row">
              <input id="allowSelfSignedTls" name="allowSelfSignedTls" type="checkbox" />
              <span>Allow self-signed TLS</span>
            </label>
            <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
          </form>
          <p id="login-error" class="login-error is-hidden"></p>
        </div>
      </div>

      <!-- VIEW: Settings -->
      <div id="settings-view" class="view is-hidden">
        <div class="settings-inner">
          <div class="account-card">
            <div class="account-badge">
              <span class="account-dot"></span>
              <span>Connected</span>
            </div>
            <p id="account-username" class="account-name">-</p>
            <p id="account-email" class="account-meta">-</p>
            <p id="account-api-url" class="account-meta">-</p>
          </div>
          <div class="storage-card">
            <div class="storage-header">
              <span class="storage-label">Storage used</span>
              <span id="storage-text" class="storage-text">- / -</span>
            </div>
            <div class="storage-track">
              <div class="storage-fill" id="storage-fill" style="width:0%"></div>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-label">Auto-sync interval</span>
            <select id="auto-sync-select" class="setting-select">
              <option value="0">Disabled</option>
              <option value="1">1 min</option>
              <option value="5" selected>5 min</option>
              <option value="15">15 min</option>
              <option value="30">30 min</option>
              <option value="60">1 hour</option>
            </select>
          </div>
          <div class="settings-footer">
            <button type="button" id="logout-btn" class="btn-danger">Sign Out</button>
          </div>
        </div>
      </div>

      <!-- Footer: just 2 buttons -->
      <footer class="footer-bar">
        <button id="sync-now-btn" class="footer-btn footer-btn-primary" type="button" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          <span id="sync-label">Sync now</span>
        </button>
        <button id="settings-btn" class="footer-btn" type="button">
          <!-- Gear icon (shown when NOT in settings) -->
          <svg id="settings-gear-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <!-- X icon (shown when IN settings) -->
          <svg id="settings-close-icon" class="is-hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          <span id="settings-label">Settings</span>
        </button>
      </footer>

    </main>

    <template id="folder-template">
      <article class="folder-item">
        <div class="folder-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="folder-copy">
          <p class="folder-title"></p>
          <p class="folder-meta"></p>
        </div>
        <div class="folder-actions">
          <button class="open-folder-btn ghost-btn" type="button" title="Open in Explorer">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
            </svg>
          </button>
          <button class="remove-folder-btn ghost-btn danger" type="button" title="Stop syncing">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </article>
    </template>

    <template id="activity-template">
      <div class="activity-item">
        <span class="activity-dot"></span>
        <span class="activity-msg"></span>
        <span class="activity-time"></span>
      </div>
    </template>

    <script src="./renderer.js"></script>
  </body>
</html>
